name: Build

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.6 --distribution-type=bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: homelab-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    name: Build release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.6 --distribution-type=bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Configure signing (optional)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          _KP: ${{ secrets.KEYSTORE_PASSWORD }}
          _KA: ${{ secrets.KEY_ALIAS }}
          _KPW: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > app/homelab-release.jks
            echo "KEYSTORE_PATH=homelab-release.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=$_KP"            >> $GITHUB_ENV
            echo "KEY_ALIAS=$_KA"                   >> $GITHUB_ENV
            echo "KEY_PASSWORD=$_KPW"               >> $GITHUB_ENV
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: homelab-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
