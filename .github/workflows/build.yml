name: Build

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # The repo ships gradle-wrapper.properties but not the jar (binary).
      # This step downloads the canonical jar directly from Gradle's CDN.
      - name: Bootstrap Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Inject the Tailscale OAuth client ID.
      # Store TAILSCALE_CLIENT_ID as a repository secret:
      #   Settings → Secrets and variables → Actions → New repository secret
      - name: Write local.properties
        run: |
          echo "TAILSCALE_CLIENT_ID=${{ secrets.TAILSCALE_CLIENT_ID }}" >> local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: homelab-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    name: Build release APK
    runs-on: ubuntu-latest
    # Only runs on main branch pushes, not PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Bootstrap Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Write local.properties
        run: |
          echo "TAILSCALE_CLIENT_ID=${{ secrets.TAILSCALE_CLIENT_ID }}" >> local.properties

      # Decode and write the keystore for signing
      - name: Decode keystore
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/homelab-release.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: homelab-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: homelab-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
