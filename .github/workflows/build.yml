name: Build

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  release:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.6 --distribution-type=bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e +o pipefail
          ./gradlew assembleRelease --no-daemon 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" != "0" ]; then
            LOG_TAIL=$(tail -120 /tmp/build.log)
            SUMMARY=$(python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" <<< "$LOG_TAIL")
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/check-runs" \
              -d "{\"name\":\"Build Release Error Log\",\"head_sha\":\"$GITHUB_SHA\",\"status\":\"completed\",\"conclusion\":\"failure\",\"output\":{\"title\":\"Gradle Build Error\",\"summary\":$SUMMARY}}"
          fi
          exit "$BUILD_EXIT"
