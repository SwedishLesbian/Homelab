name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.6 --distribution-type=bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/homelab-release.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: homelab-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release*.apk \
             app/build/outputs/apk/release/Homelab-${{ github.ref_name }}.apk

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Homelab ${{ github.ref_name }}
          body: |
            ## Install

            1. Download **Homelab-${{ github.ref_name }}.apk** below.
            2. On your Android device: *Settings → Apps → Install unknown apps* — allow your browser or file manager.
            3. Open the APK and tap **Install**.

            ## First-time setup

            1. Open Homelab.
            2. Tap **Open Tailscale Admin Console** and create a free OAuth client
               (scope: `devices:read`, redirect URI: `com.homelab.app://oauth`).
            3. Paste the **client ID** into Homelab.
            4. Tap **Sign in with Tailscale** — your devices appear automatically.

            No build secrets. No server. Works with any Tailscale account.
          files: app/build/outputs/apk/release/Homelab-${{ github.ref_name }}.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
