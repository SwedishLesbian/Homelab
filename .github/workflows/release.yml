name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  checks: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.6 --distribution-type=bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Configure signing (optional)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          _KP: ${{ secrets.KEYSTORE_PASSWORD }}
          _KA: ${{ secrets.KEY_ALIAS }}
          _KPW: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > app/homelab-release.jks
            echo "KEYSTORE_PATH=homelab-release.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=$_KP"            >> $GITHUB_ENV
            echo "KEY_ALIAS=$_KA"                   >> $GITHUB_ENV
            echo "KEY_PASSWORD=$_KPW"               >> $GITHUB_ENV
          fi

      - name: Build release APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e +o pipefail
          ./gradlew assembleRelease --no-daemon 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" != "0" ]; then
            LOG_TAIL=$(tail -120 /tmp/build.log)
            SUMMARY=$(python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" <<< "$LOG_TAIL")
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/check-runs" \
              -d "{\"name\":\"Build Release Error Log\",\"head_sha\":\"$GITHUB_SHA\",\"status\":\"completed\",\"conclusion\":\"failure\",\"output\":{\"title\":\"Gradle Build Error\",\"summary\":$SUMMARY}}"
          fi
          exit "$BUILD_EXIT"

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release*.apk \
             app/build/outputs/apk/release/Homelab-${{ github.ref_name }}.apk

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Homelab ${{ github.ref_name }}
          body: |
            ## Install

            1. Download **Homelab-${{ github.ref_name }}.apk** below.
            2. On your Android device: *Settings → Apps → Install unknown apps* — allow your browser or file manager.
            3. Open the APK and tap **Install**.

            ## First-time setup

            1. Open Homelab.
            2. Tap **Open Tailscale Admin Console** and create a free OAuth client
               (scope: `devices:read`, redirect URI: `com.homelab.app://oauth`).
            3. Paste the **client ID** into Homelab.
            4. Tap **Sign in with Tailscale** — your devices appear automatically.

            No build secrets. No server. Works with any Tailscale account.
          files: app/build/outputs/apk/release/Homelab-${{ github.ref_name }}.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
